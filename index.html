<!DOCTYPE html>
<html lang="En" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Typing Game</title>
    <link rel="stylesheet" href="output.css">
</head>

<body
    class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

    <nav
        class="w-full bg-white dark:bg-[#1e293b] border-b border-slate-200 dark:border-slate-700 shadow-lg h-20 flex justify-between items-center px-8 transition-colors duration-300">

        <h2 class="text-3xl font-bold text-blue-600 dark:text-white">
            Vanilla Typing Game
        </h2>

        <ul class="flex gap-8 text-lg items-center text-slate-600 dark:text-slate-300">
            <li>
                <a href="Features.html" class="hover:text-blue-600 dark:hover:text-white transition">Home</a>
            </li>
            <li class="flex items-center gap-2">
                <a href="#" class="hover:text-blue-600 dark:hover:text-white transition">Account</a>
                <svg class="w-7 h-7 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </li>
            <li class="ml-4">
                <button id="theme-toggle"
                    class="flex items-center gap-3 font-bold text-sm tracking-widest hover:opacity-80 transition-opacity focus:outline-none">
                    <span class="text-blue-600 dark:text-slate-500 transition-colors duration-300">LIGHT</span>
                    <span class="text-slate-300 dark:text-slate-700">/</span>
                    <span class="text-slate-400 dark:text-blue-500 transition-colors duration-300">DARK</span>
                </button>
            </li>
        </ul>

        <div
            class="flex items-center gap-2 mr-4 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border border-slate-200 dark:border-slate-700 transition-colors duration-300">
            <button type="button" id="btn-easy"
                class="diff-btn px-3 py-1 text-xs font-bold rounded-lg bg-white dark:bg-slate-700 text-blue-600 dark:text-white shadow-sm transition-all">
                Easy
            </button>
            <button type="button" id="btn-medium"
                class="diff-btn px-3 py-1 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all">
                Medium
            </button>
            <button type="button" id="btn-hard"
                class="diff-btn px-3 py-1 text-xs font-medium rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-all">
                Hard
            </button>
        </div>

        <select id="mode" class="hidden">
            <option value="easy" selected>Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </nav>

    <main class="flex-1 w-full max-w-5xl mx-auto flex flex-col items-center justify-center px-4 py-8 gap-8">

        <div class="w-full relative max-w-4xl mt-4">
            <span
                class="absolute -top-4 left-6 bg-[#22c55e] text-white text-xs font-bold px-3 py-1 rounded shadow-md z-10">
                Commencez à taper
            </span>

            <div
                class="w-full bg-white dark:bg-[#1e293b] text-slate-900 dark:text-white px-8 py-6 rounded-2xl shadow-xl text-2xl font-mono tracking-wide leading-relaxed overflow-hidden whitespace-nowrap text-ellipsis relative border border-slate-200 dark:border-slate-800">
                <div id="word-display"
                    class="max-h-20 overflow-hidden flex flex-wrap items-center leading-relaxed transition-all duration-300">
                </div>
            </div>

            <input type="text" id="input-field" autofocus autocomplete="off"
                class="absolute inset-0 opacity-0 cursor-default w-full h-full z-20">
        </div>

        <div
            class="bg-slate-100/40 dark:bg-[#0f172a]/40 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-slate-200/60 dark:border-slate-800/50 max-w-3xl w-full relative transition-all duration-300">
            <div class="flex flex-col gap-1.5">

                <div class="flex gap-1.5 justify-center">
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="2">2</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key="&">&</div>
                    <div class="key bg-[#f3e8ff] text-purple-900 dark:bg-purple-950/40 dark:text-purple-300 dark:border dark:border-purple-900/40 w-10"
                        data-key="é">é</div>
                    <div class="key bg-[#fce7f3] text-pink-900 dark:bg-pink-950/40 dark:text-pink-300 dark:border dark:border-pink-900/40 w-10"
                        data-key='"'>"</div>
                    <div class="key bg-[#fee2e2] text-red-900 dark:bg-red-950/40 dark:text-red-300 dark:border dark:border-red-900/40 w-10"
                        data-key="'">'</div>
                    <div class="key bg-[#ffedd5] text-orange-900 dark:bg-orange-950/40 dark:text-orange-300 dark:border dark:border-orange-900/40 w-10"
                        data-key="(">(</div>
                    <div class="key bg-[#fef9c3] text-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-300 dark:border dark:border-yellow-900/30 w-10"
                        data-key="-">-</div>
                    <div class="key bg-[#ecfccb] text-lime-900 dark:bg-lime-950/40 dark:text-lime-300 dark:border dark:border-lime-900/40 w-10"
                        data-key="è">è</div>
                    <div class="key bg-[#dcfce7] text-green-900 dark:bg-green-950/40 dark:text-green-300 dark:border dark:border-green-900/40 w-10"
                        data-key="_">_</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="ç">ç</div>
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="à">à</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key=")">)</div>
                    <div class="key bg-[#f3e8ff] text-purple-900 dark:bg-purple-950/40 dark:text-purple-300 dark:border dark:border-purple-900/40 w-10"
                        data-key="=">=</div>
                    <div class="key bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 dark:border dark:border-slate-700/60 flex-1 min-w-12.5 text-[10px]"
                        data-key="backspace">←</div>
                </div>

                <div class="flex gap-1.5 justify-center">
                    <div
                        class="key bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 dark:border dark:border-slate-700/60 w-14 text-[10px]">
                        TAB</div>
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="a">A</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key="z">Z</div>
                    <div class="key bg-[#fce7f3] text-pink-900 dark:bg-pink-950/40 dark:text-pink-300 dark:border dark:border-pink-900/40 w-10"
                        data-key="e">E</div>
                    <div class="key bg-[#fee2e2] text-red-900 dark:bg-red-950/40 dark:text-red-300 dark:border dark:border-red-900/40 w-10"
                        data-key="r">R</div>
                    <div class="key bg-[#ffedd5] text-orange-900 dark:bg-orange-950/40 dark:text-orange-300 dark:border dark:border-orange-900/40 w-10"
                        data-key="t">T</div>
                    <div class="key bg-[#fef9c3] text-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-300 dark:border dark:border-yellow-900/40 w-10"
                        data-key="y">Y</div>
                    <div class="key bg-[#ecfccb] text-lime-900 dark:bg-lime-950/40 dark:text-lime-300 dark:border dark:border-lime-900/40 w-10"
                        data-key="u">U</div>
                    <div class="key bg-[#dcfce7] text-green-900 dark:bg-green-950/40 dark:text-green-300 dark:border dark:border-green-900/40 w-10"
                        data-key="i">I</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="o">O</div>
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="p">P</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key="^">^</div>
                    <div class="key bg-[#f3e8ff] text-purple-900 dark:bg-purple-950/40 dark:text-purple-300 dark:border dark:border-purple-900/40 w-10"
                        data-key="$">$</div>
                    <div class="key bg-[#fce7f3] text-pink-900 dark:bg-pink-950/40 dark:text-pink-300 dark:border dark:border-pink-900/40 w-10"
                        data-key="*">*</div>
                </div>

                <div class="flex gap-1.5 justify-center">
                    <div
                        class="key bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 dark:border dark:border-slate-700/60 w-16 text-[9px] leading-tight">
                        VERR<br>MAJ</div>
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="q">Q</div>
                    <div class="key bg-[#dcfce7] text-green-900 dark:bg-green-950/40 dark:text-green-300 dark:border dark:border-green-900/40 w-10"
                        data-key="s">S</div>
                    <div class="key bg-[#fee2e2] text-red-900 dark:bg-red-950/40 dark:text-red-300 dark:border dark:border-red-900/40 w-10"
                        data-key="d">D</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="f">F</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="g">G</div>
                    <div class="key bg-[#fef9c3] text-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-300 dark:border dark:border-yellow-900/40 w-10"
                        data-key="h">H</div>
                    <div class="key bg-[#fef9c3] text-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-300 dark:border dark:border-yellow-900/40 w-10"
                        data-key="j">J</div>
                    <div class="key bg-[#ecfccb] text-lime-900 dark:bg-lime-950/40 dark:text-lime-300 dark:border dark:border-lime-900/40 w-10"
                        data-key="k">K</div>
                    <div class="key bg-[#dcfce7] text-green-900 dark:bg-green-950/40 dark:text-green-300 dark:border dark:border-green-900/40 w-10"
                        data-key="l">L</div>
                    <div class="key bg-[#e0f2fe] text-blue-900 dark:bg-blue-950/40 dark:text-blue-300 dark:border dark:border-blue-900/40 w-10"
                        data-key="m">M</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key="ù">ù</div>
                    <div class="key bg-emerald-500 text-white dark:bg-emerald-600/80 dark:text-emerald-100 flex-1 min-w-15 text-[10px]"
                        data-key="enter">ENTRÉE</div>
                </div>

                <div class="flex gap-1.5 justify-center">
                    <div
                        class="key bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 dark:border dark:border-slate-700/60 w-12 text-[10px]">
                        MAJ</div>
                    <div class="key bg-[#e0e7ff] text-indigo-900 dark:bg-indigo-950/40 dark:text-indigo-300 dark:border dark:border-indigo-900/40 w-10"
                        data-key="w">W</div>
                    <div class="key bg-[#dcfce7] text-green-900 dark:bg-green-950/40 dark:text-green-300 dark:border dark:border-green-900/40 w-10"
                        data-key="x">X</div>
                    <div class="key bg-[#fce7f3] text-pink-900 dark:bg-pink-950/40 dark:text-pink-300 dark:border dark:border-pink-900/40 w-10"
                        data-key="c">C</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="v">V</div>
                    <div class="key bg-[#ccfbf1] text-teal-900 dark:bg-teal-950/40 dark:text-teal-300 dark:border dark:border-teal-900/40 w-10"
                        data-key="b">B</div>
                    <div class="key bg-[#fef9c3] text-yellow-900 dark:bg-yellow-950/30 dark:text-yellow-300 dark:border dark:border-yellow-900/40 w-10"
                        data-key="n">N</div>
                    <div class="key bg-[#ffedd5] text-orange-900 dark:bg-orange-950/40 dark:text-orange-300 dark:border dark:border-orange-900/40 w-10"
                        data-key=",">,</div>
                    <div class="key bg-[#ffedd5] text-orange-900 dark:bg-orange-950/40 dark:text-orange-300 dark:border dark:border-orange-900/40 w-10"
                        data-key=";">;</div>
                    <div class="key bg-[#fee2e2] text-red-900 dark:bg-red-950/40 dark:text-red-300 dark:border dark:border-red-900/40 w-10"
                        data-key=":">:</div>
                    <div class="key bg-[#fee2e2] text-red-900 dark:bg-red-950/40 dark:text-red-300 dark:border dark:border-red-900/40 w-10"
                        data-key="!">!</div>
                    <div
                        class="key bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 dark:border dark:border-slate-700/60 w-20 text-[10px]">
                        MAJ</div>
                </div>

                <div class="flex gap-1.5 justify-center mt-1">
                    <div class="key bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-slate-200 dark:border dark:border-slate-700 w-64 h-9.5 shadow-md rounded-md"
                        data-key=" "></div>
                </div>

            </div>
        </div>

        <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6 mt-4" id="results">

            <div
                class="bg-white dark:bg-[#1e293b] p-5 rounded-2xl flex items-center justify-between shadow-lg border border-slate-200 dark:border-slate-800 transition-colors duration-300">
                <div>
                    <p class="text-xs font-semibold text-slate-400 dark:text-slate-400 tracking-wider uppercase">Vanilla
                        Typing</p>
                    <p class="text-3xl font-extrabold text-slate-900 dark:text-white mt-1"><span id="wpm-value">0</span>
                        <span class="text-xs font-normal text-slate-400">WPM</span>
                    </p>
                </div>
                <div class="relative w-16 h-16">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="fill-none stroke-slate-200 dark:stroke-slate-800" stroke-width="3"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="wpm-circle" class="stroke-emerald-500 fill-none" stroke-width="3"
                            stroke-dasharray="0, 100" stroke-linecap="round"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-xs font-bold text-emerald-500 dark:text-emerald-400"
                        id="wpm-percent">0</div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-[#1e293b] p-5 rounded-2xl flex items-center justify-between shadow-lg border border-slate-200 dark:border-slate-800 transition-colors duration-300">
                <div>
                    <p class="text-xs font-semibold text-slate-400 dark:text-slate-400 tracking-wider uppercase">
                        Accuracy</p>
                    <p class="text-3xl font-extrabold text-slate-900 dark:text-white mt-1"><span
                            id="accuracy-value">100</span><span class="text-lg font-bold text-slate-400">%</span></p>
                </div>
                <div class="relative w-16 h-16">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="fill-none stroke-slate-200 dark:stroke-slate-800" stroke-width="3"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="accuracy-circle" class="stroke-blue-500 fill-none" stroke-width="3"
                            stroke-dasharray="100, 100" stroke-linecap="round"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-xs font-bold text-blue-500 dark:text-blue-400"
                        id="accuracy-percent">100%</div>
                </div>
            </div>

            <div
                class="bg-white dark:bg-[#1e293b] p-5 rounded-2xl flex flex-col justify-center shadow-lg border border-slate-200 dark:border-slate-800 transition-colors duration-300">
                <p class="text-xs font-semibold text-slate-400 dark:text-slate-400 tracking-wider uppercase mb-2">
                    Progress</p>
                <div class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar"
                        class="bg-linear-to-r from-blue-500 to-indigo-500 h-full w-0 transition-all duration-150">
                    </div>
                </div>
                <div
                    class="flex justify-between items-center mt-2 text-[11px] text-slate-500 dark:text-slate-400 font-mono">
                    <span id="progress-text">Word 0/0</span>
                    <span id="progress-percentage">0%</span>
                </div>
            </div>

        </div>
    </main>

    <footer
        class="w-full text-center py-4 text-slate-400 dark:text-slate-500 text-xs border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-[#0f172a] transition-colors duration-300">
        © 2026 Vanilla Typing — Improve your speed
    </footer>

    <script src="index.js"></script>
</body>

</html>
